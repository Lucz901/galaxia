<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital@1&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }
#wrap{width:100%;height:100vh;position:relative;background:#000;}
#galaxy-scene,#planet-scene{position:absolute;inset:0;transition:opacity 1.2s ease;}
#planet-scene{opacity:0;pointer-events:none;}

#planet-scene.visible{opacity:1;pointer-events:all;}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
#hint{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#ffb3d9;font-size:16px;letter-spacing:2px;z-index:20;white-space:nowrap;animation:blink 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes blink{0%,100%{opacity:0.35;}50%{opacity:1;}}
#flash{position:absolute;inset:0;background:radial-gradient(circle,#ffe0f5,#fff);opacity:0;pointer-events:none;z-index:100;transition:opacity 0.35s;}
#planet-title{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;font-size:32px;font-weight:700;color:#ffe4f5;text-shadow:0 0 20px #ff69b4,0 0 50px #c084fc;white-space:nowrap;letter-spacing:2px;z-index:30;pointer-events:none;}
#planet-sub{position:absolute;top:65px;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-style:italic;color:#f9a8d4;font-size:14px;letter-spacing:3px;white-space:nowrap;z-index:30;pointer-events:none;opacity:0.8;}
#tap-hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#f9a8d4;font-size:15px;letter-spacing:1px;white-space:nowrap;z-index:30;pointer-events:none;animation:blink 2s ease-in-out infinite;}
#back-btn{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);background:rgba(255,105,180,0.15);border:1px solid rgba(255,105,180,0.5);color:#ffe4f5;font-family:'Dancing Script',cursive;font-size:18px;padding:8px 32px;border-radius:24px;cursor:pointer;z-index:30;letter-spacing:1px;transition:background 0.2s;display:none;}
#back-btn:hover{background:rgba(255,105,180,0.35);}
</style>

<div id="wrap">

  <div id="galaxy-scene">

</div>
