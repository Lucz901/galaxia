
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital@1&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
#wrap{width:100%;height:620px;position:relative;border-radius:16px;overflow:hidden;background:#000;}
#galaxy-scene,#planet-scene{position:absolute;inset:0;transition:opacity 1.2s ease;}
#planet-scene{opacity:0;pointer-events:none;}
#galaxy-scene.hidden{opacity:0;pointer-events:none;}
#planet-scene.visible{opacity:1;pointer-events:all;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#ffb3d9;font-size:14px;letter-spacing:2px;z-index:20;white-space:nowrap;animation:blink 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes blink{0%,100%{opacity:0.35;}50%{opacity:1;}}
#flash{position:absolute;inset:0;background:radial-gradient(circle,#ffe0f5,#fff);opacity:0;pointer-events:none;z-index:100;border-radius:16px;transition:opacity 0.35s;}
#planet-title{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;font-size:26px;font-weight:700;color:#ffe4f5;text-shadow:0 0 20px #ff69b4,0 0 50px #c084fc;white-space:nowrap;letter-spacing:2px;z-index:30;pointer-events:none;}
#planet-sub{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-style:italic;color:#f9a8d4;font-size:13px;letter-spacing:3px;white-space:nowrap;z-index:30;pointer-events:none;opacity:0.8;}
#tap-hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#f9a8d4;font-size:13px;letter-spacing:1px;white-space:nowrap;z-index:30;pointer-events:none;animation:blink 2s ease-in-out infinite;}
#back-btn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(255,105,180,0.15);border:1px solid rgba(255,105,180,0.5);color:#ffe4f5;font-family:'Dancing Script',cursive;font-size:16px;padding:8px 28px;border-radius:24px;cursor:pointer;z-index:30;letter-spacing:1px;transition:background 0.2s;display:none;}
#back-btn:hover{background:rgba(255,105,180,0.35);}
</style>

<div id="wrap">
  <div id="flash"></div>
  <div id="galaxy-scene">
    <canvas id="gc"></canvas>
  </div>
  <div id="planet-scene">
    <canvas id="pc"></canvas>
    <div id="planet-title">✦ Planeta Eu Te Amo ✦</div>
    <div id="planet-sub">um mundo criado só para você</div>
    <div id="tap-hint">toque no planeta para sentir o amor 💗</div>
    <button id="back-btn">↩ voltar à galáxia</button>
  </div>
  <div id="hint">clique no coração para viajar ✨</div>
</div>

<script>
(function(){
const wrap=document.getElementById('wrap');
const W=wrap.offsetWidth||700, H=620;
const galaxyEl=document.getElementById('galaxy-scene');
const planetEl=document.getElementById('planet-scene');
const flash=document.getElementById('flash');
const gc=document.getElementById('gc');
gc.width=W; gc.height=H;
const gx=gc.getContext('2d');
const cx=W/2, cy=H/2;
let gT=0, gRAF, heartClicked=false, heartPulse=0;

// ── STARS ──
const starField=Array.from({length:420},()=>{
  const types=['#ffffff','#ffe8ff','#e8e8ff','#fff8e0','#ffd0ff'];
  return{
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()**2.2*2.8+0.15,
    phase:Math.random()*Math.PI*2,
    spd:Math.random()*0.007+0.001,
    col:types[Math.floor(Math.random()*types.length)],
    twinkle:Math.random()>0.6
  };
});

// ── NEBULAE ──
const nebulae=[
  {x:cx-130,y:cy-60,rx:220,ry:110,c:'#6a0dad',a:0.09},
  {x:cx+100,y:cy+50,rx:170,ry:85,c:'#a50050',a:0.07},
  {x:cx+60,y:cy-120,rx:140,ry:70,c:'#0d47a1',a:0.06},
  {x:cx-60,y:cy+100,rx:130,ry:65,c:'#880e4f',a:0.05},
];

// ── DC ITEMS orbiting in space ──
// Each has: symbol, orbit radius, speed, angle, size, depth (y-scale)
const dcItems=[
  // Batman & Robin & DC icons
  {sym:'🦇',r:155,sp:0.0009,a:0,sz:22,ry:0.38},
  {sym:'🦇',r:155,sp:0.0009,a:Math.PI,sz:18,ry:0.38},
  {sym:'🦸',r:240,sp:-0.0006,a:0.8,sz:20,ry:0.35},
  {sym:'⚡',r:240,sp:-0.0006,a:0.8+Math.PI,sz:18,ry:0.35},
  {sym:'🌟',r:310,sp:0.00045,a:1.2,sz:16,ry:0.32},
  {sym:'💫',r:310,sp:0.00045,a:1.2+Math.PI*0.7,sz:14,ry:0.32},
  {sym:'🌙',r:370,sp:-0.00035,a:2.1,sz:18,ry:0.3},
  {sym:'⭐',r:370,sp:-0.00035,a:2.1+Math.PI,sz:14,ry:0.3},
  // Extra DC flair
  {sym:'🦸',r:200,sp:0.0007,a:3.0,sz:17,ry:0.36},
  {sym:'🦇',r:280,sp:-0.0005,a:0.3,sz:16,ry:0.33},
  {sym:'💥',r:200,sp:0.0007,a:3.0+Math.PI,sz:15,ry:0.36},
  {sym:'🌠',r:340,sp:0.0004,a:1.8,sz:16,ry:0.31},
];

// ── WORD RINGS ──
const ringWords=[
  {ws:['amor','paixão','carinho','ternura','beijo','abraço'],r:120,sp:0.0008,sz:17,c:'#ff9de2'},
  {ws:['eternidade','doçura','saudade','te amo','sonho','desejo','magia'],r:205,sp:-0.00055,sz:15,c:'#c084fc'},
  {ws:['florescer','alma gêmea','coração','afeto','romance','delicadeza','encanto'],r:285,sp:0.0004,sz:13,c:'#f9a8d4'},
  {ws:['felicidade','júbilo','meu bem','devoção','luz','infinito','para sempre'],r:355,sp:-0.0003,sz:12,c:'#a78bfa'},
];
const ringWordObjs=[];
ringWords.forEach((ring,ri)=>{
  ring.ws.forEach((w,wi)=>{
    ringWordObjs.push({text:w,ring,baseAngle:(2*Math.PI/ring.ws.length)*wi+ri*1.3});
  });
});

// ── SHOOTING STARS ──
const shooters=[];
setInterval(()=>{
  if(shooters.length<3) shooters.push({x:-30,y:Math.random()*H*0.55,vx:7+Math.random()*5,vy:0.8+Math.random()*2.5,life:1,trail:[]});
},3200);

// ── COSMIC DUST ──
const dust=Array.from({length:80},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*0.6+0.1,
  a:Math.random()*0.25,
  col:['#ff80c0','#c080ff','#80c0ff'][Math.floor(Math.random()*3)]
}));

// ── AURORA ──
let auroraT=0;

function drawGalaxy(){
  gT++; auroraT+=0.008;
  gx.clearRect(0,0,W,H);

  // Deep space background
  const bg=gx.createRadialGradient(cx,cy*0.7,0,cx,cy,Math.max(W,H)*0.9);
  bg.addColorStop(0,'#18002e');bg.addColorStop(0.35,'#0c0020');bg.addColorStop(0.7,'#04000e');bg.addColorStop(1,'#000004');
  gx.fillStyle=bg; gx.fillRect(0,0,W,H);

  // Aurora bands
  for(let i=0;i<3;i++){
    const ay=H*0.15+i*H*0.18+Math.sin(auroraT+i*2.1)*25;
    const ag=gx.createLinearGradient(0,ay-40,0,ay+40);
    const cols=['rgba(100,0,180,0.06)','rgba(180,0,100,0.05)','rgba(0,60,180,0.05)'];
    ag.addColorStop(0,'transparent');ag.addColorStop(0.5,cols[i]);ag.addColorStop(1,'transparent');
    gx.fillStyle=ag; gx.fillRect(0,ay-40,W,80);
  }

  // Nebulae
  nebulae.forEach(n=>{
    gx.save();
    const ng=gx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    ng.addColorStop(0,n.c+'28');ng.addColorStop(0.4,n.c+'14');ng.addColorStop(0.8,n.c+'06');ng.addColorStop(1,'transparent');
    gx.scale(1,n.ry/n.rx);
    gx.beginPath();gx.arc(n.x,n.y*(n.rx/n.ry),n.rx,0,Math.PI*2);
    gx.fillStyle=ng;gx.fill();gx.restore();
  });

  // Cosmic dust
  dust.forEach(d=>{
    gx.beginPath();gx.arc(d.x,d.y,d.r,0,Math.PI*2);
    gx.fillStyle=d.col;gx.globalAlpha=d.a;gx.fill();gx.globalAlpha=1;
  });

  // Stars with diffraction spikes
  starField.forEach(s=>{
    if(s.twinkle) s.phase+=s.spd;
    const al=s.twinkle?(0.25+0.75*Math.abs(Math.sin(s.phase))):0.7;
    gx.beginPath();gx.arc(s.x,s.y,s.r,0,Math.PI*2);
    gx.fillStyle=s.col;gx.globalAlpha=al;gx.fill();
    if(s.r>1.4){
      gx.globalAlpha=al*0.35;
      gx.strokeStyle=s.col;gx.lineWidth=0.6;
      const spike=s.r*4;
      gx.beginPath();gx.moveTo(s.x-spike,s.y);gx.lineTo(s.x+spike,s.y);gx.stroke();
      gx.beginPath();gx.moveTo(s.x,s.y-spike);gx.lineTo(s.x,s.y+spike);gx.stroke();
      if(s.r>2){
        const d2=spike*0.65;
        gx.beginPath();gx.moveTo(s.x-d2,s.y-d2);gx.lineTo(s.x+d2,s.y+d2);gx.stroke();
        gx.beginPath();gx.moveTo(s.x+d2,s.y-d2);gx.lineTo(s.x-d2,s.y+d2);gx.stroke();
      }
    }
    gx.globalAlpha=1;
  });

  // Shooting stars
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i];
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>18) s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life-=0.022;
    if(s.life<=0){shooters.splice(i,1);continue;}
    s.trail.forEach((pt,ti)=>{
      const ta=(ti/s.trail.length)*s.life*0.8;
      gx.beginPath();gx.arc(pt.x,pt.y,1.2*(ti/s.trail.length),0,Math.PI*2);
      gx.fillStyle=`rgba(255,230,255,${ta})`;gx.fill();
    });
    gx.beginPath();gx.arc(s.x,s.y,1.8,0,Math.PI*2);
    gx.fillStyle=`rgba(255,255,255,${s.life})`;gx.fill();
  }

  // Orbit ellipses — subtle
  [...ringWords,...dcItems.map(d=>({r:d.r,ry:d.ry}))].forEach(o=>{
    const ory=o.ry||0.42;
    gx.beginPath();gx.ellipse(cx,cy,o.r,o.r*ory,0,0,Math.PI*2);
    gx.strokeStyle='rgba(180,120,255,0.055)';gx.lineWidth=0.5;gx.stroke();
  });

  // DC items in orbit (back half first)
  dcItems.forEach(item=>{
    item.a+=item.sp;
    const ix=cx+Math.cos(item.a)*item.r;
    const iy=cy+Math.sin(item.a)*item.r*item.ry;
    const depth=(Math.sin(item.a)+1)/2;
    if(Math.sin(item.a)<0){
      gx.globalAlpha=(0.3+0.7*depth)*0.85;
      gx.font=`${item.sz*(0.65+0.35*depth)}px serif`;
      gx.textAlign='center';gx.textBaseline='middle';
      gx.fillText(item.sym,ix,iy);
      gx.globalAlpha=1;
    }
  });

  // Word rings (back half)
  ringWordObjs.forEach(obj=>{
    const a=obj.baseAngle+obj.ring.sp*gT;
    const wx=cx+Math.cos(a)*obj.ring.r;
    const wy=cy+Math.sin(a)*obj.ring.r*0.4;
    const depth=(Math.sin(a)+1)/2;
    if(Math.sin(a)<0){
      gx.save();
      gx.globalAlpha=(0.15+0.85*depth)*0.9;
      gx.font=`${obj.ring.sz*(0.65+0.35*depth)}px 'Dancing Script',cursive`;
      gx.fillStyle=obj.ring.c;
      gx.shadowColor=obj.ring.c;gx.shadowBlur=10*depth;
      gx.textAlign='center';gx.textBaseline='middle';
      gx.fillText(obj.text,wx,wy);
      gx.restore();
    }
  });

  // Central nebula glow
  const cg=gx.createRadialGradient(cx,cy,0,cx,cy,110);
  cg.addColorStop(0,'rgba(255,80,180,0.22)');cg.addColorStop(0.4,'rgba(160,40,220,0.1)');cg.addColorStop(1,'transparent');
  gx.fillStyle=cg;gx.beginPath();gx.arc(cx,cy,110,0,Math.PI*2);gx.fill();

  // Pulsing heart
  heartPulse+=0.05;
  const hs=heartClicked?0:(1+0.13*Math.sin(heartPulse));
  const hsize=62*hs;
  // Glow rings around heart
  [40,28,16].forEach((gr,gi)=>{
    const ga=gx.createRadialGradient(cx,cy,0,cx,cy,gr*hs+gi*8);
    ga.addColorStop(0,`rgba(255,80,160,${0.12-gi*0.03})`);ga.addColorStop(1,'transparent');
    gx.fillStyle=ga;gx.beginPath();gx.arc(cx,cy,(gr+gi*10)*hs,0,Math.PI*2);gx.fill();
  });
  gx.save();
  gx.translate(cx,cy);
  gx.font=`${hsize}px serif`;
  gx.textAlign='center';gx.textBaseline='middle';
  gx.shadowColor='#ff3090';gx.shadowBlur=40;
  gx.fillText('💗',0,0);
  // Second pass for extra glow
  gx.shadowBlur=20;gx.globalAlpha=0.5;
  gx.fillText('💗',0,0);
  gx.restore();

  // DC items (front half)
  dcItems.forEach(item=>{
    const ix=cx+Math.cos(item.a)*item.r;
    const iy=cy+Math.sin(item.a)*item.r*item.ry;
    const depth=(Math.sin(item.a)+1)/2;
    if(Math.sin(item.a)>=0){
      gx.globalAlpha=(0.4+0.6*depth);
      gx.font=`${item.sz*(0.65+0.35*depth)}px serif`;
      gx.textAlign='center';gx.textBaseline='middle';
      gx.shadowColor='rgba(200,150,255,0.6)';gx.shadowBlur=8;
      gx.fillText(item.sym,ix,iy);
      gx.globalAlpha=1;gx.shadowBlur=0;
    }
  });

  // Word rings (front half)
  ringWordObjs.forEach(obj=>{
    const a=obj.baseAngle+obj.ring.sp*gT;
    const wx=cx+Math.cos(a)*obj.ring.r;
    const wy=cy+Math.sin(a)*obj.ring.r*0.4;
    const depth=(Math.sin(a)+1)/2;
    if(Math.sin(a)>=0){
      gx.save();
      gx.globalAlpha=(0.2+0.8*depth);
      gx.font=`${obj.ring.sz*(0.65+0.35*depth)}px 'Dancing Script',cursive`;
      gx.fillStyle=obj.ring.c;
      gx.shadowColor=obj.ring.c;gx.shadowBlur=12*depth;
      gx.textAlign='center';gx.textBaseline='middle';
      gx.fillText(obj.text,wx,wy);
      gx.restore();
    }
  });

  gRAF=requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

gc.style.cursor='pointer';
gc.addEventListener('click',e=>{
  const rect=gc.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if(Math.hypot(mx-cx,my-cy)<46&&!heartClicked){
    heartClicked=true;
    flash.style.opacity='1';
    setTimeout(()=>{
      galaxyEl.classList.add('hidden');
      planetEl.classList.add('visible');
      document.getElementById('back-btn').style.display='block';
      cancelAnimationFrame(gRAF);
      startPlanet();
      setTimeout(()=>{flash.style.opacity='0';},150);
    },340);
  }
});

// ══════════════════════
// PLANET SCENE
// ══════════════════════
const heartParticles=[];
let pRAF;

function startPlanet(){
  const pc=document.getElementById('pc');
  pc.width=W;pc.height=H;
  const px=pc.getContext('2d');
  const pcx=W/2,pcy=H/2+10;
  const PR=Math.min(W,H)*0.145;
  const ORX=PR*2.15,ORY=PR*0.68;
  let pT=0;
  const orbitHearts=[];

  // DC items floating around planet
  const planetDC=[
    {sym:'🦇',angle:0.5,r:PR*2.8,ry:0.45,sp:0.008,sz:24},
    {sym:'🦇',angle:0.5+Math.PI,r:PR*2.8,ry:0.45,sp:0.008,sz:20},
    {sym:'🦸',angle:1.2,r:PR*3.2,ry:0.4,sp:-0.006,sz:22},
    {sym:'⚡',angle:2.5,r:PR*2.6,ry:0.42,sp:0.007,sz:18},
    {sym:'🌙',angle:3.8,r:PR*3.0,ry:0.38,sp:-0.005,sz:20},
    {sym:'💥',angle:0.9,r:PR*3.5,ry:0.36,sp:0.006,sz:17},
    {sym:'🌟',angle:2.0,r:PR*2.9,ry:0.43,sp:-0.007,sz:16},
    {sym:'🦸',angle:4.2,r:PR*3.3,ry:0.4,sp:0.005,sz:19},
  ];

  function spawnOrbitHearts(){
    for(let i=0;i<10+Math.floor(Math.random()*6);i++){
      orbitHearts.push({
        angle:Math.random()*Math.PI*2,
        speed:(Math.random()<0.5?1:-1)*(0.02+Math.random()*0.015),
        sym:['💕','💗','💖','❤️','💓','💝','🌸','✨'][Math.floor(Math.random()*8)],
        sz:14+Math.random()*20,life:1,decay:0.003+Math.random()*0.004,
        rx:ORX+(Math.random()-0.5)*35,ry:ORY+(Math.random()-0.5)*14,
      });
    }
    for(let i=0;i<14;i++){
      heartParticles.push({
        x:pcx+(Math.random()-0.5)*PR*0.8,y:pcy-PR*0.6,
        vx:(Math.random()-0.5)*6,vy:-(2.5+Math.random()*5),
        sym:['💕','✨','💖','🌸','⭐','💗'][Math.floor(Math.random()*6)],
        sz:11+Math.random()*16,life:1,decay:0.015+Math.random()*0.01
      });
    }
  }

  pc.style.cursor='pointer';
  pc.addEventListener('click',e=>{
    const rect=pc.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    const my=(e.clientY-rect.top)*(H/rect.height);
    if(Math.hypot(mx-pcx,my-pcy)<PR+24) spawnOrbitHearts();
  });

  const pWords=[
    {t:'eu te amo',c:'#ff6eb4',sz:26,ox:pcx,oy:pcy-PR*2.0,ph:0,spd:0.007},
    {t:'para sempre',c:'#f9a8d4',sz:19,ox:pcx-PR*1.7,oy:pcy-PR*1.2,ph:1,spd:0.006},
    {t:'meu universo',c:'#c084fc',sz:17,ox:pcx+PR*1.6,oy:pcy-PR*1.1,ph:2,spd:0.008},
    {t:'infinito',c:'#e879f9',sz:21,ox:pcx-PR*1.9,oy:pcy+PR*0.2,ph:0.5,spd:0.005},
    {t:'só você',c:'#ff9de2',sz:22,ox:pcx+PR*1.8,oy:pcy+PR*0.3,ph:1.5,spd:0.007},
    {t:'devoção',c:'#a78bfa',sz:17,ox:pcx+PR*1.2,oy:pcy+PR*1.6,ph:2.2,spd:0.009},
    {t:'luz da minha vida',c:'#f472b6',sz:14,ox:pcx,oy:pcy+PR*2.2,ph:1.2,spd:0.005},
    {t:'minha estrela',c:'#fda4af',sz:15,ox:pcx-PR*1.2,oy:pcy+PR*1.7,ph:3,spd:0.006},
  ];

  let bgStarsDrawn=false;
  const bgStars=Array.from({length:300},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.1,a:Math.random()*0.55+0.1}));

  function drawPlanet(){
    pT++;
    px.clearRect(0,0,W,H);

    // Space bg
    const bg=px.createRadialGradient(pcx,pcy*0.6,0,pcx,pcy,Math.max(W,H)*0.95);
    bg.addColorStop(0,'#1e0038');bg.addColorStop(0.4,'#0c0022');bg.addColorStop(0.8,'#050010');bg.addColorStop(1,'#010006');
    px.fillStyle=bg;px.fillRect(0,0,W,H);

    // Nebula behind planet
    const nb=px.createRadialGradient(pcx,pcy,0,pcx,pcy,PR*4);
    nb.addColorStop(0,'rgba(180,0,120,0.12)');nb.addColorStop(0.4,'rgba(100,0,180,0.07)');nb.addColorStop(1,'transparent');
    px.fillStyle=nb;px.beginPath();px.arc(pcx,pcy,PR*4,0,Math.PI*2);px.fill();

    // Background stars
    bgStars.forEach(s=>{
      px.beginPath();px.arc(s.x,s.y,s.r,0,Math.PI*2);
      px.fillStyle=`rgba(220,200,255,${s.a})`;px.fill();
    });

    // Distant galaxy streak
    px.save();px.translate(W*0.15,H*0.2);px.rotate(-0.4);
    const gs=px.createLinearGradient(-60,0,60,0);
    gs.addColorStop(0,'transparent');gs.addColorStop(0.5,'rgba(200,150,255,0.08)');gs.addColorStop(1,'transparent');
    px.fillStyle=gs;px.fillRect(-60,-8,120,16);px.restore();

    // Back orbit dashes
    px.save();px.setLineDash([5,9]);px.lineWidth=0.8;
    px.beginPath();px.ellipse(pcx,pcy,ORX,ORY,0,Math.PI,Math.PI*2);
    px.strokeStyle='rgba(255,150,220,0.18)';px.stroke();px.restore();

    // Orbit hearts back
    orbitHearts.forEach(h=>{
      h.angle+=h.speed;h.life-=h.decay;
      const hx=pcx+Math.cos(h.angle)*h.rx,hy=pcy+Math.sin(h.angle)*h.ry;
      if(Math.sin(h.angle)<0&&h.life>0){
        px.globalAlpha=h.life*(0.4+0.6*Math.abs(Math.sin(h.angle)));
        px.font=`${h.sz}px serif`;px.textAlign='center';px.textBaseline='middle';
        px.fillText(h.sym,hx,hy);px.globalAlpha=1;
      }
    });

    // DC items back half
    planetDC.forEach(d=>{
      d.angle+=d.sp;
      const dx=pcx+Math.cos(d.angle)*d.r,dy=pcy+Math.sin(d.angle)*d.r*d.ry;
      if(Math.sin(d.angle)<0){
        const dep=(Math.sin(d.angle)+1)/2;
        px.globalAlpha=0.3+0.7*dep;
        px.font=`${d.sz*(0.6+0.4*dep)}px serif`;
        px.textAlign='center';px.textBaseline='middle';
        px.fillText(d.sym,dx,dy);px.globalAlpha=1;
      }
    });

    // Planet atmosphere outer
    const atm=px.createRadialGradient(pcx,pcy,PR*0.9,pcx,pcy,PR*2.5);
    atm.addColorStop(0,'rgba(255,80,180,0.18)');atm.addColorStop(0.3,'rgba(180,30,200,0.08)');atm.addColorStop(1,'transparent');
    px.fillStyle=atm;px.beginPath();px.arc(pcx,pcy,PR*2.5,0,Math.PI*2);px.fill();

    // Planet body
    const pgrad=px.createRadialGradient(pcx-PR*0.32,pcy-PR*0.32,PR*0.05,pcx,pcy,PR);
    pgrad.addColorStop(0,'#ffb3e0');pgrad.addColorStop(0.2,'#ff6eb4');pgrad.addColorStop(0.5,'#c2185b');pgrad.addColorStop(0.78,'#6a0040');pgrad.addColorStop(1,'#1e0018');
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.fillStyle=pgrad;px.fill();

    // Surface detail — cloud bands
    px.save();px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.clip();
    for(let i=0;i<4;i++){
      const bw=PR*(0.4+Math.random()*0.3);
      const by=pcy-PR+i*(PR*0.55)+Math.sin(pT*0.003+i)*5;
      const band=px.createLinearGradient(pcx-bw,by,pcx+bw,by+PR*0.18);
      band.addColorStop(0,'transparent');band.addColorStop(0.5,`rgba(255,180,220,0.09)`);band.addColorStop(1,'transparent');
      px.fillStyle=band;px.fillRect(pcx-bw,by,bw*2,PR*0.18);
    }
    // Swirl texture
    for(let i=0;i<6;i++){
      const sa=i*1.05+pT*0.004;
      const sx=pcx+Math.cos(sa)*PR*0.5,sy=pcy+Math.sin(sa)*PR*0.35;
      const lg=px.createRadialGradient(sx,sy,0,sx,sy,PR*0.35);
      lg.addColorStop(0,'rgba(255,140,200,0.12)');lg.addColorStop(1,'transparent');
      px.fillStyle=lg;px.fillRect(pcx-PR,pcy-PR,PR*2,PR*2);
    }
    // Surface hearts
    ['❤️','💕','🌸','💗','✨'].forEach((s,i)=>{
      const sa=i*1.26+pT*0.003;
      px.font=`${10+i%3*3}px serif`;
      px.globalAlpha=0.28+0.18*Math.sin(pT*0.05+i);
      px.textAlign='center';px.textBaseline='middle';
      px.fillText(s,pcx+Math.cos(sa)*PR*0.5,pcy+Math.sin(sa)*PR*0.45);
    });
    px.globalAlpha=1;px.restore();

    // Planet rim glow
    const rim=px.createRadialGradient(pcx-PR*0.4,pcy-PR*0.4,PR*0.6,pcx,pcy,PR);
    rim.addColorStop(0,'rgba(255,200,230,0.0)');rim.addColorStop(0.85,'rgba(255,150,210,0.15)');rim.addColorStop(1,'rgba(255,120,200,0.35)');
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.fillStyle=rim;px.fill();
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);
    px.strokeStyle='rgba(255,180,230,0.45)';px.lineWidth=2.5;px.stroke();

    // Ring system
    px.save();px.translate(pcx,pcy);px.scale(1,0.2);
    [{r1:PR+10,r2:PR+26,c:'rgba(255,150,200,0.38)'},{r1:PR+30,r2:PR+44,c:'rgba(200,110,255,0.28)'},{r1:PR+48,r2:PR+56,c:'rgba(255,170,215,0.18)'}].forEach(rg=>{
      const rg2=px.createRadialGradient(0,0,rg.r1,0,0,rg.r2);
      rg2.addColorStop(0,rg.c);rg2.addColorStop(1,'transparent');
      px.beginPath();px.arc(0,0,rg.r2,0,Math.PI*2);px.fillStyle=rg2;px.fill();
    });
    px.restore();

    // Front orbit dashes
    px.save();px.setLineDash([5,9]);px.lineWidth=1;
    px.beginPath();px.ellipse(pcx,pcy,ORX,ORY,0,0,Math.PI);
    px.strokeStyle='rgba(255,160,220,0.5)';px.stroke();px.restore();

    // Orbit hearts front
    orbitHearts.forEach(h=>{
      const hx=pcx+Math.cos(h.angle)*h.rx,hy=pcy+Math.sin(h.angle)*h.ry;
      if(Math.sin(h.angle)>=0&&h.life>0){
        px.globalAlpha=h.life*(0.6+0.4*Math.abs(Math.sin(h.angle)));
        px.font=`${h.sz}px serif`;px.textAlign='center';px.textBaseline='middle';
        px.fillText(h.sym,hx,hy);px.globalAlpha=1;
      }
    });
    for(let i=orbitHearts.length-1;i>=0;i--){if(orbitHearts[i].life<=0)orbitHearts.splice(i,1);}

    // DC items front half
    planetDC.forEach(d=>{
      const dx=pcx+Math.cos(d.angle)*d.r,dy=pcy+Math.sin(d.angle)*d.r*d.ry;
      if(Math.sin(d.angle)>=0){
        const dep=(Math.sin(d.angle)+1)/2;
        px.globalAlpha=0.45+0.55*dep;
        px.font=`${d.sz*(0.65+0.35*dep)}px serif`;
        px.textAlign='center';px.textBaseline='middle';
        px.shadowColor='rgba(220,180,255,0.7)';px.shadowBlur=10;
        px.fillText(d.sym,dx,dy);px.globalAlpha=1;px.shadowBlur=0;
      }
    });

    // Burst particles
    heartParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.98;p.life-=p.decay;});
    for(let i=heartParticles.length-1;i>=0;i--){
      const p=heartParticles[i];
      if(p.life<=0){heartParticles.splice(i,1);continue;}
      px.globalAlpha=p.life;
      px.font=`${p.sz}px serif`;px.textAlign='center';
      px.fillText(p.sym,p.x,p.y);
    }
    px.globalAlpha=1;

    // Floating words
    pWords.forEach(w=>{
      const fx=w.ox+Math.cos(w.ph+pT*w.spd*0.7)*15;
      const fy=w.oy+Math.sin(w.ph+pT*w.spd)*11;
      px.globalAlpha=0.5+0.5*Math.sin(w.ph+pT*w.spd*1.3);
      px.font=`${w.sz}px 'Dancing Script',cursive`;
      px.fillStyle=w.c;px.textAlign='center';px.textBaseline='middle';
      px.shadowColor=w.c;px.shadowBlur=12;
      px.fillText(w.t,fx,fy);px.shadowBlur=0;
    });
    px.globalAlpha=1;

    pRAF=requestAnimationFrame(drawPlanet);
  }
  drawPlanet();
}

document.getElementById('back-btn').addEventListener('click',()=>{
  flash.style.opacity='1';
  setTimeout(()=>{
    cancelAnimationFrame(pRAF);
    heartParticles.length=0;
    document.getElementById('back-btn').style.display='none';
    planetEl.classList.remove('visible');
    galaxyEl.classList.remove('hidden');
    heartClicked=false;
    drawGalaxy();
    setTimeout(()=>{flash.style.opacity='0';},150);
  },300);
});
})();
</script>
