<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planeta Eu Te Amo 💗</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#wrap{width:100%;height:100vh;position:relative;overflow:hidden;background:#000;}
#galaxy-scene,#planet-scene{position:absolute;inset:0;transition:opacity 1.2s ease;}
#planet-scene{opacity:0;pointer-events:none;}
#galaxy-scene.hidden{opacity:0;pointer-events:none;}
#planet-scene.visible{opacity:1;pointer-events:all;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#ffb3d9;font-size:14px;letter-spacing:2px;z-index:20;white-space:nowrap;animation:blink 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}
#flash{position:absolute;inset:0;background:radial-gradient(circle,#ffe0f5,#fff);opacity:0;pointer-events:none;z-index:100;transition:opacity 0.35s;}
#planet-title{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;font-size:clamp(18px,5vw,28px);font-weight:700;color:#ffe4f5;text-shadow:0 0 20px #ff69b4,0 0 50px #c084fc;white-space:nowrap;letter-spacing:2px;z-index:30;pointer-events:none;}
#planet-sub{position:absolute;top:52px;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-style:italic;color:#f9a8d4;font-size:clamp(10px,3vw,13px);letter-spacing:3px;white-space:nowrap;z-index:30;pointer-events:none;opacity:0.8;}
#tap-hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;color:#f9a8d4;font-size:clamp(11px,3vw,13px);letter-spacing:1px;white-space:nowrap;z-index:30;pointer-events:none;animation:blink 2s ease-in-out infinite;}
#back-btn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(255,105,180,0.15);border:1px solid rgba(255,105,180,0.5);color:#ffe4f5;font-family:'Dancing Script',cursive;font-size:16px;padding:8px 28px;border-radius:24px;cursor:pointer;z-index:30;letter-spacing:1px;transition:background 0.2s;display:none;}
#back-btn:hover{background:rgba(255,105,180,0.35);}
</style>
</head>
<body>
<div id="wrap">
  <div id="flash"></div>
  <div id="galaxy-scene"><canvas id="gc"></canvas></div>
  <div id="planet-scene">
    <canvas id="pc"></canvas>
    <div id="planet-title">✦ Planeta Eu Te Amo ✦</div>
    <div id="planet-sub">um mundo criado só para você</div>
    <div id="tap-hint">toque no planeta para sentir o amor 💗</div>
    <button id="back-btn">↩ voltar à galáxia</button>
  </div>
  <div id="hint">clique no coração para viajar ✨</div>
</div>

function loadImg(b64){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.src='data:image/png;base64,'+b64;
  });
}

];
const ringWordObjs=[];
ringWords.forEach((ring,ri)=>{ring.ws.forEach((w,wi)=>{ringWordObjs.push({text:w,ring,baseAngle:(2*Math.PI/ring.ws.length)*wi+ri*1.3});});});
const shooters=[];
setInterval(()=>{if(shooters.length<3)shooters.push({x:-30,y:Math.random()*H*0.55,vx:7+Math.random()*5,vy:0.8+Math.random()*2.5,life:1,trail:[]});},3200);
let auroraT=0;

function drawOrbiters(sinFilter){
  dcOrbiters.forEach(d=>{
    d.a+=d.sp;
    const ix=cx+Math.cos(d.a)*d.r;
    const iy=cy+Math.sin(d.a)*d.r*d.ry;
    const depth=(Math.sin(d.a)+1)/2;
    const inFront=Math.sin(d.a)>=0;
    if((sinFilter==='front'&&inFront)||(sinFilter==='back'&&!inFront)){
      const s=d.sz*(0.65+0.35*depth);
      gx.save();
      gx.globalAlpha=(0.3+0.7*depth)*0.9;
      // Glow
      gx.shadowColor='rgba(255,150,220,0.7)';gx.shadowBlur=12*depth;
      gx.drawImage(d.img,ix-s/2,iy-s/2,s,s);
      gx.shadowBlur=0;
      gx.restore();
    }
  });
}

function drawGalaxy(){
  gT++;auroraT+=0.008;
  gx.clearRect(0,0,W,H);
  const bg=gx.createRadialGradient(cx,cy*0.7,0,cx,cy,Math.max(W,H)*0.9);
  bg.addColorStop(0,'#18002e');bg.addColorStop(0.35,'#0c0020');bg.addColorStop(0.7,'#04000e');bg.addColorStop(1,'#000004');
  gx.fillStyle=bg;gx.fillRect(0,0,W,H);
  for(let i=0;i<3;i++){
    const ay=H*0.15+i*H*0.18+Math.sin(auroraT+i*2.1)*25;
    const ag=gx.createLinearGradient(0,ay-40,0,ay+40);
    const cols=['rgba(100,0,180,0.06)','rgba(180,0,100,0.05)','rgba(0,60,180,0.05)'];
    ag.addColorStop(0,'transparent');ag.addColorStop(0.5,cols[i]);ag.addColorStop(1,'transparent');
    gx.fillStyle=ag;gx.fillRect(0,ay-40,W,80);
  }
  nebulae.forEach(n=>{
    gx.save();
    const ng=gx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    ng.addColorStop(0,n.c+'28');ng.addColorStop(0.4,n.c+'14');ng.addColorStop(1,'transparent');
    gx.scale(1,n.ry/n.rx);gx.beginPath();gx.arc(n.x,n.y*(n.rx/n.ry),n.rx,0,Math.PI*2);
    gx.fillStyle=ng;gx.fill();gx.restore();
  });
  dust.forEach(d=>{gx.beginPath();gx.arc(d.x,d.y,d.r,0,Math.PI*2);gx.fillStyle=d.col;gx.globalAlpha=d.a;gx.fill();gx.globalAlpha=1;});
  starField.forEach(s=>{
    if(s.twinkle)s.phase+=s.spd;
    const al=s.twinkle?(0.25+0.75*Math.abs(Math.sin(s.phase))):0.7;
    gx.beginPath();gx.arc(s.x,s.y,s.r,0,Math.PI*2);gx.fillStyle=s.col;gx.globalAlpha=al;gx.fill();
    if(s.r>1.4){
      gx.globalAlpha=al*0.3;gx.strokeStyle=s.col;gx.lineWidth=0.6;
      const sp=s.r*4;
      gx.beginPath();gx.moveTo(s.x-sp,s.y);gx.lineTo(s.x+sp,s.y);gx.stroke();
      gx.beginPath();gx.moveTo(s.x,s.y-sp);gx.lineTo(s.x,s.y+sp);gx.stroke();
    }
    gx.globalAlpha=1;
  });
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i];s.trail.push({x:s.x,y:s.y});if(s.trail.length>18)s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life-=0.022;
    if(s.life<=0){shooters.splice(i,1);continue;}
    s.trail.forEach((pt,ti)=>{
      gx.beginPath();gx.arc(pt.x,pt.y,1.2*(ti/s.trail.length),0,Math.PI*2);
      gx.fillStyle=`rgba(255,230,255,${(ti/s.trail.length)*s.life*0.8})`;gx.fill();
    });
    gx.beginPath();gx.arc(s.x,s.y,1.8,0,Math.PI*2);gx.fillStyle=`rgba(255,255,255,${s.life})`;gx.fill();
  }
  // Orbit rings
  [...ringWords,...dcOrbiters.map(d=>({r:d.r,ry:d.ry})),...dcEmoji].forEach(o=>{
    const ory=o.ry||0.4;
    gx.beginPath();gx.ellipse(cx,cy,o.r,o.r*ory,0,0,Math.PI*2);
    gx.strokeStyle='rgba(180,120,255,0.05)';gx.lineWidth=0.5;gx.stroke();
  });
  // Back half
  drawOrbiters('back');
  dcEmoji.forEach(d=>{
    d.a+=d.sp;
    const ix=cx+Math.cos(d.a)*d.r,iy=cy+Math.sin(d.a)*d.r*d.ry;
    const dep=(Math.sin(d.a)+1)/2;
    if(Math.sin(d.a)<0){gx.globalAlpha=(0.3+0.7*dep)*0.85;gx.font=`${d.sz*(0.65+0.35*dep)}px serif`;gx.textAlign='center';gx.textBaseline='middle';gx.fillText(d.sym,ix,iy);gx.globalAlpha=1;}
  });
  ringWordObjs.forEach(obj=>{
    const a=obj.baseAngle+obj.ring.sp*gT;
    const wx=cx+Math.cos(a)*obj.ring.r,wy=cy+Math.sin(a)*obj.ring.r*0.4;
    const dep=(Math.sin(a)+1)/2;
    if(Math.sin(a)<0){gx.save();gx.globalAlpha=(0.15+0.85*dep)*0.9;gx.font=`${obj.ring.sz*(0.65+0.35*dep)}px 'Dancing Script',cursive`;gx.fillStyle=obj.ring.c;gx.shadowColor=obj.ring.c;gx.shadowBlur=10*dep;gx.textAlign='center';gx.textBaseline='middle';gx.fillText(obj.text,wx,wy);gx.restore();}
  });
  const cg=gx.createRadialGradient(cx,cy,0,cx,cy,110);
  cg.addColorStop(0,'rgba(255,80,180,0.2)');cg.addColorStop(1,'transparent');
  gx.fillStyle=cg;gx.beginPath();gx.arc(cx,cy,110,0,Math.PI*2);gx.fill();
  heartPulse+=0.05;
  const hs=heartClicked?0:(1+0.13*Math.sin(heartPulse));
  gx.save();gx.translate(cx,cy);gx.font=`${Math.max(42,W*0.085)*hs}px serif`;gx.textAlign='center';gx.textBaseline='middle';gx.shadowColor='#ff3090';gx.shadowBlur=40;gx.fillText('💗',0,0);gx.restore();
  // Front half
  drawOrbiters('front');
  dcEmoji.forEach(d=>{
    const ix=cx+Math.cos(d.a)*d.r,iy=cy+Math.sin(d.a)*d.r*d.ry;
    const dep=(Math.sin(d.a)+1)/2;
    if(Math.sin(d.a)>=0){gx.globalAlpha=(0.4+0.6*dep);gx.font=`${d.sz*(0.65+0.35*dep)}px serif`;gx.textAlign='center';gx.textBaseline='middle';gx.shadowColor='rgba(200,150,255,0.6)';gx.shadowBlur=8;gx.fillText(d.sym,ix,iy);gx.globalAlpha=1;gx.shadowBlur=0;}
  });
  ringWordObjs.forEach(obj=>{
    const a=obj.baseAngle+obj.ring.sp*gT;
    const wx=cx+Math.cos(a)*obj.ring.r,wy=cy+Math.sin(a)*obj.ring.r*0.4;
    const dep=(Math.sin(a)+1)/2;
    if(Math.sin(a)>=0){gx.save();gx.globalAlpha=(0.2+0.8*dep);gx.font=`${obj.ring.sz*(0.65+0.35*dep)}px 'Dancing Script',cursive`;gx.fillStyle=obj.ring.c;gx.shadowColor=obj.ring.c;gx.shadowBlur=12*dep;gx.textAlign='center';gx.textBaseline='middle';gx.fillText(obj.text,wx,wy);gx.restore();}
  });
  gRAF=requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

gc.style.cursor='pointer';
gc.addEventListener('click',e=>{
  const r=gc.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(Math.hypot(mx-cx,my-cy)<Math.max(36,W*0.065)&&!heartClicked){
    heartClicked=true;flash.style.opacity='1';
    setTimeout(()=>{
      galaxyEl.classList.add('hidden');planetEl.classList.add('visible');
      document.getElementById('back-btn').style.display='block';
      cancelAnimationFrame(gRAF);startPlanet();
      setTimeout(()=>{flash.style.opacity='0';},150);
    },340);
  }
});
gc.addEventListener('touchstart',e=>{
  const r=gc.getBoundingClientRect();
  const t=e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width),my=(t.clientY-r.top)*(H/r.height);
  if(Math.hypot(mx-cx,my-cy)<Math.max(46,W*0.08)&&!heartClicked){
    heartClicked=true;flash.style.opacity='1';
    setTimeout(()=>{
      galaxyEl.classList.add('hidden');planetEl.classList.add('visible');
      document.getElementById('back-btn').style.display='block';
      cancelAnimationFrame(gRAF);startPlanet();
      setTimeout(()=>{flash.style.opacity='0';},150);
    },340);
  }
},{passive:true});

const heartParticles=[];
let pRAF;

function startPlanet(){
  const pc=document.getElementById('pc');
  pc.width=W;pc.height=H;
  const px=pc.getContext('2d');
  const pcx=W/2,pcy=H/2;
  const PR=Math.min(W,H)*0.15;
  const ORX=PR*2.1,ORY=PR*0.65;
  let pT=0;
  const orbitHearts=[];
  // DC orbiters around planet
  const pDC=[
    {img:batmanImg,angle:0.4,r:PR*2.9,ry:0.44,sp:0.009,sz:PR*0.62},
    {img:batmanImg,angle:0.4+Math.PI,r:PR*2.9,ry:0.44,sp:0.009,sz:PR*0.52},
    {img:robinImg,angle:1.5,r:PR*3.3,ry:0.4,sp:-0.007,sz:PR*0.56},
    {img:robinImg,angle:1.5+Math.PI,r:PR*3.3,ry:0.4,sp:-0.007,sz:PR*0.46},
  ];
  function spawnOrbitHearts(){
    for(let i=0;i<12+Math.floor(Math.random()*6);i++){
      orbitHearts.push({angle:Math.random()*Math.PI*2,speed:(Math.random()<0.5?1:-1)*(0.02+Math.random()*0.015),sym:['💕','💗','💖','❤️','💓','💝','🌸','✨'][Math.floor(Math.random()*8)],sz:12+Math.random()*20,life:1,decay:0.003+Math.random()*0.004,rx:ORX+(Math.random()-0.5)*30,ry:ORY+(Math.random()-0.5)*12});
    }
    for(let i=0;i<14;i++){
      heartParticles.push({x:pcx+(Math.random()-0.5)*PR*0.8,y:pcy-PR*0.5,vx:(Math.random()-0.5)*6,vy:-(2.5+Math.random()*5),sym:['💕','✨','💖','🌸','⭐','💗'][Math.floor(Math.random()*6)],sz:11+Math.random()*16,life:1,decay:0.015});
    }
  }
  function onTap(mx,my){if(Math.hypot(mx-pcx,my-pcy)<PR+28)spawnOrbitHearts();}
  pc.addEventListener('click',e=>{const r=pc.getBoundingClientRect();onTap((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));});
  pc.addEventListener('touchstart',e=>{const r=pc.getBoundingClientRect();const t=e.touches[0];onTap((t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height));},{passive:true});

  const pWords=[
    {t:'eu te amo',c:'#ff6eb4',sz:Math.max(16,W*0.038),ox:pcx,oy:pcy-PR*2.1,ph:0,spd:0.007},
    {t:'para sempre',c:'#f9a8d4',sz:Math.max(13,W*0.028),ox:pcx-PR*1.7,oy:pcy-PR*1.2,ph:1,spd:0.006},
    {t:'meu universo',c:'#c084fc',sz:Math.max(12,W*0.025),ox:pcx+PR*1.65,oy:pcy-PR*1.1,ph:2,spd:0.008},
    {t:'infinito',c:'#e879f9',sz:Math.max(14,W*0.03),ox:pcx-PR*1.9,oy:pcy+PR*0.2,ph:0.5,spd:0.005},
    {t:'só você',c:'#ff9de2',sz:Math.max(15,W*0.032),ox:pcx+PR*1.8,oy:pcy+PR*0.3,ph:1.5,spd:0.007},
    {t:'devoção',c:'#a78bfa',sz:Math.max(12,W*0.026),ox:pcx+PR*1.2,oy:pcy+PR*1.65,ph:2.2,spd:0.009},
    {t:'luz da minha vida',c:'#f472b6',sz:Math.max(11,W*0.022),ox:pcx,oy:pcy+PR*2.2,ph:1.2,spd:0.005},
    {t:'minha estrela',c:'#fda4af',sz:Math.max(12,W*0.023),ox:pcx-PR*1.2,oy:pcy+PR*1.7,ph:3,spd:0.006},
  ];
  const bgStars=Array.from({length:280},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.1,a:Math.random()*0.5+0.1}));

  function drawDCOrbiters(sinFilter){
    pDC.forEach(d=>{
      d.angle+=d.sp;
      const dx=pcx+Math.cos(d.angle)*d.r,dy=pcy+Math.sin(d.angle)*d.r*d.ry;
      const dep=(Math.sin(d.angle)+1)/2;
      const inFront=Math.sin(d.angle)>=0;
      if((sinFilter==='front'&&inFront)||(sinFilter==='back'&&!inFront)){
        const s=d.sz*(0.6+0.4*dep);
        px.save();px.globalAlpha=0.35+0.65*dep;
        px.shadowColor='rgba(255,150,220,0.6)';px.shadowBlur=10*dep;
        px.drawImage(d.img,dx-s/2,dy-s/2,s,s);
        px.shadowBlur=0;px.restore();
      }
    });
  }

  function drawPlanet(){
    pT++;px.clearRect(0,0,W,H);
    const bg=px.createRadialGradient(pcx,pcy*0.6,0,pcx,pcy,Math.max(W,H)*0.95);
    bg.addColorStop(0,'#1e0038');bg.addColorStop(0.4,'#0c0022');bg.addColorStop(0.8,'#050010');bg.addColorStop(1,'#010006');
    px.fillStyle=bg;px.fillRect(0,0,W,H);
    const nb=px.createRadialGradient(pcx,pcy,0,pcx,pcy,PR*4);
    nb.addColorStop(0,'rgba(180,0,120,0.12)');nb.addColorStop(0.4,'rgba(100,0,180,0.07)');nb.addColorStop(1,'transparent');
    px.fillStyle=nb;px.beginPath();px.arc(pcx,pcy,PR*4,0,Math.PI*2);px.fill();
    bgStars.forEach(s=>{px.beginPath();px.arc(s.x,s.y,s.r,0,Math.PI*2);px.fillStyle=`rgba(220,200,255,${s.a})`;px.fill();});
    // Back orbit
    px.save();px.setLineDash([5,9]);px.lineWidth=0.8;
    px.beginPath();px.ellipse(pcx,pcy,ORX,ORY,0,Math.PI,Math.PI*2);
    px.strokeStyle='rgba(255,150,220,0.18)';px.stroke();px.restore();
    // Back orbit hearts
    orbitHearts.forEach(h=>{
      h.angle+=h.speed;h.life-=h.decay;
      const hx=pcx+Math.cos(h.angle)*h.rx,hy=pcy+Math.sin(h.angle)*h.ry;
      if(Math.sin(h.angle)<0&&h.life>0){px.globalAlpha=h.life*(0.4+0.6*Math.abs(Math.sin(h.angle)));px.font=`${h.sz}px serif`;px.textAlign='center';px.textBaseline='middle';px.fillText(h.sym,hx,hy);px.globalAlpha=1;}
    });
    drawDCOrbiters('back');
    // Planet glow
    const atm=px.createRadialGradient(pcx,pcy,PR*0.9,pcx,pcy,PR*2.5);
    atm.addColorStop(0,'rgba(255,80,180,0.18)');atm.addColorStop(1,'transparent');
    px.fillStyle=atm;px.beginPath();px.arc(pcx,pcy,PR*2.5,0,Math.PI*2);px.fill();
    // Planet body
    const pg=px.createRadialGradient(pcx-PR*0.32,pcy-PR*0.32,PR*0.05,pcx,pcy,PR);
    pg.addColorStop(0,'#ffb3e0');pg.addColorStop(0.2,'#ff6eb4');pg.addColorStop(0.5,'#c2185b');pg.addColorStop(0.78,'#6a0040');pg.addColorStop(1,'#1e0018');
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.fillStyle=pg;px.fill();
    px.save();px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.clip();
    for(let i=0;i<6;i++){const sa=i*1.05+pT*0.004,sr=PR*0.5;const lg=px.createRadialGradient(pcx+Math.cos(sa)*sr,pcy+Math.sin(sa)*sr*0.45,0,pcx+Math.cos(sa)*sr,pcy+Math.sin(sa)*sr*0.45,PR*0.35);lg.addColorStop(0,'rgba(255,140,200,0.11)');lg.addColorStop(1,'transparent');px.fillStyle=lg;px.fillRect(pcx-PR,pcy-PR,PR*2,PR*2);}
    ['❤️','💕','🌸','💗','✨'].forEach((s,i)=>{const sa=i*1.26+pT*0.003;px.font=`${Math.max(8,PR*0.13)+i%3*3}px serif`;px.globalAlpha=0.28+0.18*Math.sin(pT*0.05+i);px.textAlign='center';px.textBaseline='middle';px.fillText(s,pcx+Math.cos(sa)*PR*0.5,pcy+Math.sin(sa)*PR*0.45);});
    px.globalAlpha=1;px.restore();
    const rim=px.createRadialGradient(pcx-PR*0.4,pcy-PR*0.4,PR*0.6,pcx,pcy,PR);
    rim.addColorStop(0.85,'rgba(255,150,210,0.15)');rim.addColorStop(1,'rgba(255,120,200,0.35)');
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.fillStyle=rim;px.fill();
    px.beginPath();px.arc(pcx,pcy,PR,0,Math.PI*2);px.strokeStyle='rgba(255,180,230,0.45)';px.lineWidth=2.5;px.stroke();
    // Rings
    px.save();px.translate(pcx,pcy);px.scale(1,0.2);
    [{r1:PR+10,r2:PR+26,c:'rgba(255,150,200,0.38)'},{r1:PR+30,r2:PR+44,c:'rgba(200,110,255,0.28)'},{r1:PR+48,r2:PR+56,c:'rgba(255,170,215,0.18)'}].forEach(rg=>{
      const rg2=px.createRadialGradient(0,0,rg.r1,0,0,rg.r2);rg2.addColorStop(0,rg.c);rg2.addColorStop(1,'transparent');
      px.beginPath();px.arc(0,0,rg.r2,0,Math.PI*2);px.fillStyle=rg2;px.fill();
    });px.restore();
    // Front orbit
    px.save();px.setLineDash([5,9]);px.lineWidth=1;
    px.beginPath();px.ellipse(pcx,pcy,ORX,ORY,0,0,Math.PI);
    px.strokeStyle='rgba(255,160,220,0.5)';px.stroke();px.restore();
    orbitHearts.forEach(h=>{
      const hx=pcx+Math.cos(h.angle)*h.rx,hy=pcy+Math.sin(h.angle)*h.ry;
      if(Math.sin(h.angle)>=0&&h.life>0){px.globalAlpha=h.life*(0.6+0.4*Math.abs(Math.sin(h.angle)));px.font=`${h.sz}px serif`;px.textAlign='center';px.textBaseline='middle';px.fillText(h.sym,hx,hy);px.globalAlpha=1;}
    });
    for(let i=orbitHearts.length-1;i>=0;i--){if(orbitHearts[i].life<=0)orbitHearts.splice(i,1);}
    drawDCOrbiters('front');
    heartParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.98;p.life-=p.decay;});
    for(let i=heartParticles.length-1;i>=0;i--){
      const p=heartParticles[i];if(p.life<=0){heartParticles.splice(i,1);continue;}
      px.globalAlpha=p.life;px.font=`${p.sz}px serif`;px.textAlign='center';px.fillText(p.sym,p.x,p.y);
    }
    px.globalAlpha=1;
    pWords.forEach(w=>{
      const fx=w.ox+Math.cos(w.ph+pT*w.spd*0.7)*14,fy=w.oy+Math.sin(w.ph+pT*w.spd)*10;
      px.globalAlpha=0.5+0.5*Math.sin(w.ph+pT*w.spd*1.3);
      px.font=`${w.sz}px 'Dancing Script',cursive`;px.fillStyle=w.c;px.textAlign='center';px.textBaseline='middle';
      px.shadowColor=w.c;px.shadowBlur=12;px.fillText(w.t,fx,fy);px.shadowBlur=0;
    });
    px.globalAlpha=1;
    pRAF=requestAnimationFrame(drawPlanet);
  }
  drawPlanet();
}

document.getElementById('back-btn').addEventListener('click',()=>{
  flash.style.opacity='1';
  setTimeout(()=>{
    cancelAnimationFrame(pRAF);heartParticles.length=0;
    document.getElementById('back-btn').style.display='none';
    planetEl.classList.remove('visible');galaxyEl.classList.remove('hidden');
    heartClicked=false;drawGalaxy();
    setTimeout(()=>{flash.style.opacity='0';},150);
  },300);
});
}
})();
</script>
</body>
</html>
